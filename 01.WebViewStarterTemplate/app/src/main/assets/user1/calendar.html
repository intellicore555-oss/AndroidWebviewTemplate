<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário Diário Completo</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Quicksand',sans-serif;
    background:#000;
    color:#fff;
}

/* voltar */
#voltar{
    position:absolute;
    top:15px;
    left:50%;
    transform: translateX(-50%);
    padding:10px 16px;
    border-radius:999px;
    font-size: 20px;
    color:pink;
    text-decoration:none;
    
    font-weight:700;
    z-index:10;
    white-space: nowrap;
animation:fade 0.8s ease-out;
}

/* fade */
@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.container{
    max-width:900px;
    margin:90px auto;
    padding:20px;
    animation:fade 0.8s ease-out;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

button{
    background:#111;
    border:1px solid #333;
    color:#fff;
    padding:8px 12px;
    border-radius:10px;
    cursor:pointer;
}

h1{
    font-size:20px;
    margin:0;
}

/* dias */
.grid{
    display:grid;
    grid-template-columns:repeat(1, 1fr);
    gap:10px;
}

.day{
    background:#0b0b0b;
    border:1px solid #1f1f1f;
    border-radius:14px;
    padding:14px;
    transition:0.2s;
}

.day:hover{
    background:#151515;
}

.date{
    font-size:16px;
    font-weight:600;
    margin-bottom:6px;
}

.event{
    font-size:13px;
    color:#aaa;
}
</style>
</head>

<body>

<a id="voltar" href="botao.html">Clique em mim para voltar!</a>

<div class="container">

    <div class="topbar">
        <button onclick="changeMonth(-1)">◀</button>
        <h1 id="title"></h1>
        <button onclick="changeMonth(1)">▶</button>
    </div>

    <div class="grid" id="grid"></div>
</div>

<script>
let current = new Date();

/* pega eventos do localStorage */
function getEvents(){
    return JSON.parse(localStorage.getItem("events") || "{}");
}

/* salva eventos */
function saveEvents(data){
    localStorage.setItem("events", JSON.stringify(data));
}

/* chave da data */
function key(date){
    return date.toISOString().split('T')[0];
}

function formatDate(date){
    return new Intl.DateTimeFormat('pt-BR', {
        weekday:'short',
        day:'numeric',
        month:'long',
        year:'numeric'
    }).format(date);
}

function render(){
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    const events = getEvents();

    const year = current.getFullYear();
    const month = current.getMonth();

    const lastDay = new Date(year, month + 1, 0);

    document.getElementById("title").innerText =
        current.toLocaleDateString('pt-BR', { month:'long', year:'numeric' });

    for(let d = 1; d <= lastDay.getDate(); d++){
        const date = new Date(year, month, d);
        const k = key(date);

        const div = document.createElement("div");
        div.className = "day";

        const dateText = document.createElement("div");
        dateText.className = "date";
        dateText.innerText = formatDate(date);

        const eventText = document.createElement("div");
        eventText.className = "event";
        eventText.innerText = events[k] || "Sem eventos";

        div.appendChild(dateText);
        div.appendChild(eventText);

        div.onclick = () => {
            const atual = events[k];

            if(atual){
                const op = confirm(
                    dateText.innerText + "\n\nEvento: " + atual + "\n\nDeseja apagar?"
                );

                if(op){
                    delete events[k];
                    saveEvents(events);
                    render();
                }

            } else {
                const novo = prompt("Criar evento para:\n" + dateText.innerText);

                if(novo && novo.trim() !== ""){
                    events[k] = novo.trim();
                    saveEvents(events);
                    render();
                }
            }
        };

        grid.appendChild(div);
    }
}

function changeMonth(step){
    current.setMonth(current.getMonth() + step);
    render();
}

render();
</script>

</body>
</html>
