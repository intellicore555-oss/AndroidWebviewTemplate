<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(-20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

* {
font-family: 'Quicksand', sans-serif;
animation: fadeUp 0.45s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

body {
  margin:0;
  background: #000;
}

.container {
 padding:15px; 
height: 80%;
overflow-y: auto;
position: relative;
top: 25px;
}

.card {
  background: rgba(64,64,64,0.7);
  backdrop-filter: blur(12px);
  padding:15px;
  margin-bottom:15px;
  border-radius:16px;
  box-shadow: 0 0 25px rgba(255,0,150,0.2);
}

#conquistas {
  background: rgba(64,64,64,0.7);
  backdrop-filter: blur(12px);
  padding:15px;
  margin-bottom:15px;
  border-radius:16px;
  box-shadow: 0 0 25px rgba(255,0,150,0.2);
width: 90%;
}

button {
  background: linear-gradient(45deg,#ff4d88,#ff99cc);
  border:none;
  padding:12px;
  border-radius:50px;
  width:100%;
  margin-top:8px;
  color:#fff;
  font-weight:bold;
}

input, select {
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:100px;
  border:none;
}

#peso {
width:92.5%;
  padding:10px;
  margin-top:5px;
  border-radius:100px;
  border:none;
}

.progress {
  height:10px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.bar {
  height:100%;
  width:0%;
 border-radius: 80px;
background:linear-gradient(90deg,#ff4d88,#ff99cc);
}

.popup {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:110%;
  display:none;
  background:#000;
  justify-content:center;
  align-items:center;
}

.popup-box {
  background:#222;
  padding:20px;
  border-radius:15px;
  width:80%;
  text-align:center;
}

h1, h2, h3, h4, h5, h6, p {
color: white;
}
</style>
</head>

<body>

<div class="container">
<h1 onclick="window.location.href='botao.html'" style="color: pink;">
  Clique em mim para voltar!
</h1>
<br><br>

<div class="card">
<h3>🔥 Progresso</h3>
<div class="progress"><div class="bar" id="barraXP"></div></div>
<p id="xpTexto"></p>
<p id="nivelTexto"></p>
<p id="streakTexto"></p>
</div>

<div class="card">
<h3>🏃‍♀️ Treino</h3>

<h4>Escolha o nível do treino:</h4>

<button onclick="iniciarTreinoNivel('Iniciante')">🟢 Iniciante</button>
<button onclick="iniciarTreinoNivel('Intermediário')">🟡 Intermediário</button>
<button onclick="iniciarTreinoNivel('Avançado')">🔴 Avançado</button>
<br><br>
<button onclick="iniciarTreino()">Começar treino</button>

<h4 id="nomeEx"></h4>
<p id="descricaoEx"></p>

<p>⏱️ Tempo restante: <span id="tempo">30</span>s</p>

</div>

<div class="card">
<h3>🥤 Hidratação</h3>
<button onclick="beber('agua')">Beber água</button>
<button onclick="beber('refri')">Refrigerante</button>
</div>

<div class="card">
<h3>🍔 Alimentação</h3>
<button onclick="comer('saudavel')">Comida saudável</button>
<button onclick="comer('fast')">Fast food</button>
</div>

<div class="card">
<h3>⚖️ Peso</h3>
<input id="peso">
<button onclick="salvarPeso()">Salvar</button>
<p id="pesoTexto"></p>
</div>

<h3>🏆Conquistas:</h3>
<div id="conquistas"></div>

<button onclick="resetarDados()" style="background:linear-gradient(45deg,#ff0000,#ff4d4d)">
  ⚠️ Resetar tudo
</button>

</div>


<div class="popup" id="popup">
<div class="popup-box">
<h3 id="pt"></h3>
<p id="px"></p>
<button onclick="fechar()">OK</button>
</div>
</div>

<script>
// ======================
// 🔥 DADOS
// ======================

let xp = parseInt(localStorage.getItem("xp")) || 0;
let nivel = parseInt(localStorage.getItem("nivel")) || 1;
let streak = parseInt(localStorage.getItem("streak")) || 0;
let conquistas = JSON.parse(localStorage.getItem("conquistas")) || [];

// ======================
// 🏆 CONQUISTAS
// ======================

let listaConquistas = [
  {id:"nivel2", nome:"Subindo 🚀", desc:"Chegou ao nível 2"},
  {id:"nivel5", nome:"Focada 🔥", desc:"Chegou ao nível 5"},
  {id:"desafio1", nome:"Primeiro desafio 🎯", desc:"Completou um desafio"}
];

function ganharConquista(id){
  if(conquistas.includes(id)) return;

  conquistas.push(id);
  localStorage.setItem("conquistas", JSON.stringify(conquistas));

  let c = listaConquistas.find(c=>c.id===id);

  popup("🏆 Nova conquista!", c.nome + " - " + c.desc);

  renderConquistas();
}

function renderConquistas(){
  let div = document.getElementById("conquistas");
  if(!div) return;

  div.innerHTML = "";

  conquistas.forEach(id=>{
    let c = listaConquistas.find(c=>c.id===id);

    div.innerHTML += `
      <div style="background:#333;padding:10px;margin-top:5px;border-radius:10px;">
        <b>${c.nome}</b><br>
        <small>${c.desc}</small>
      </div>
    `;
  });
}

// ======================
// 🏃 TREINO
// ======================

let exercicios = {
  "Iniciante":["Caminhada leve","Agachamento","Polichinelo"],
  "Intermediário":["Corrida","Flexão","Abdominal"],
  "Avançado":["Sprint","Burpee","HIIT pesado"]
};

let lista = [];
let atual = 0;
let tempo = 30;
let intervalo;

function iniciarTreinoNivel(nivel){
  lista = exercicios[nivel];
  atual = 0;

  document.getElementById("nomeEx").innerText = "";
  document.getElementById("descricaoEx").innerText = "Preparando...";

  proximo();
}

function proximo(){
  if(atual >= lista.length){
    ganharXP(20);
    streak++;
    salvar();
    popup("Treino completo 💪","Você mandou muito bem!");
    return;
  }

  document.getElementById("nomeEx").innerText = lista[atual];
  document.getElementById("descricaoEx").innerText = "Foco total agora!";

  iniciarContagem();
}

function iniciarContagem(){
  clearInterval(intervalo);
  tempo = 30;

  document.getElementById("tempo").innerText = tempo;

  intervalo = setInterval(()=>{
    tempo--;
    document.getElementById("tempo").innerText = tempo;

    if(tempo <= 0){
      clearInterval(intervalo);
      atual++;
      popup("Boa 🔥","Próximo exercício!");
      setTimeout(proximo,1200);
    }
  },1000);
}

// ======================
// ⭐ XP / NÍVEL
// ======================

function ganharXP(q){
  xp += q;

  if(xp >= nivel * 100){
    xp = 0;
    nivel++;

    popup("🚀 Subiu de nível!","Agora você está no nível " + nivel);

    if(nivel === 2) ganharConquista("nivel2");
    if(nivel === 5) ganharConquista("nivel5");
  }

  salvar();
  atualizarUI();
}

// ======================
// 💧 HIDRATAÇÃO
// ======================

function beber(tipo){
  if(tipo === "agua"){
    ganharXP(5);
    popup("Boa 💧","Hidratação em dia!");
  } else {
    popup("Hmm 😅","Evite exageros, tá?");
  }
}

// ======================
// 🍔 ALIMENTAÇÃO
// ======================

function comer(tipo){
  if(tipo === "saudavel"){
    ganharXP(5);
    popup("Perfeito 💚","Escolha inteligente!");
  } else {
    popup("Sem culpa 👍","Mas tenta equilibrar!");
  }
}

// ======================
// 🎯 DESAFIO
// ======================

function desafio(){
  let listaDesafios = [
    "Beber 2L de água hoje",
    "Treinar por 10 minutos",
    "Evitar açúcar hoje"
  ];

  let d = listaDesafios[Math.floor(Math.random()*listaDesafios.length)];

  document.getElementById("desafioTexto").innerText = d;

  ganharXP(10);
  ganharConquista("desafio1");

  popup("Novo desafio 🎯", d);
}

// ======================
// ⚖️ PESO
// ======================

function salvarPeso(){
  let p = document.getElementById("peso").value;

  if(!p){
    popup("Ops 😅","Digite um peso válido!");
    return;
  }

  localStorage.setItem("peso", p);

  document.getElementById("pesoTexto").innerText =
    "Peso atual: " + p + " kg";

  popup("Salvo 💾","Peso atualizado!");
}

// ======================
// 🗑️ RESET SEM CONFIRM NATIVO
// ======================

let confirmarReset = false;

function resetarDados(){
  if(!confirmarReset){
    confirmarReset = true;

    popup("⚠️ Atenção","Clique novamente para confirmar o reset total!");

    setTimeout(()=>{
      confirmarReset = false;
    },3000);

    return;
  }

  // reset real
  localStorage.clear();

  xp = 0;
  nivel = 1;
  streak = 0;
  conquistas = [];

  document.getElementById("pesoTexto").innerText = "";
  document.getElementById("nomeEx").innerText = "";
  document.getElementById("descricaoEx").innerText = "";
  document.getElementById("tempo").innerText = "30";

  atualizarUI();
  renderConquistas();

  popup("Dados apagados 🗑️","Tudo foi resetado!");
}

// ======================
// 📊 UI
// ======================

function atualizarUI(){
  document.getElementById("xpTexto").innerText = "XP: " + xp;
  document.getElementById("nivelTexto").innerText = "Nível: " + nivel;
  document.getElementById("streakTexto").innerText = "Streak 🔥: " + streak;

  let porcent = (xp / (nivel * 100)) * 100;
  document.getElementById("barraXP").style.width = porcent + "%";
}

// ======================
// 💬 POPUP
// ======================

function popup(t,x){
  document.getElementById("pt").innerText = t;
  document.getElementById("px").innerText = x;
  document.getElementById("popup").style.display="flex";
}

function fechar(){
  document.getElementById("popup").style.display="none";
}

// ======================
// 💾 SAVE
// ======================

function salvar(){
  localStorage.setItem("xp", xp);
  localStorage.setItem("nivel", nivel);
  localStorage.setItem("streak", streak);
}

// ======================
// 🚀 LOAD
// ======================

window.onload = ()=>{
  atualizarUI();
  renderConquistas();

  let p = localStorage.getItem("peso");
  if(p){
    document.getElementById("pesoTexto").innerText =
      "Peso atual: " + p + " kg";
  }
};
</script>

</body>
</html>
