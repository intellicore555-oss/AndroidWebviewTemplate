<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciclo</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;700&display=swap" rel="stylesheet">


<style>
.fade-up {
    opacity: 0;
    transform: translateY(-30px);
    animation: fadeUp 0.6s ease forwards;
}

@keyframes fadeUp {
    0% {
        opacity: 0;
        transform: translateY(-30px);
    }
    100% {
        opacity: 1;
        transform: translateY(0);
    }
}

* {
    box-sizing: border-box;
    /* seu estilo */
    font-family: 'Quicksand', sans-serif;
    animation: fadeUp 0.6s ease forwards;
}

body {
    margin: 0;
    background: black;
    color: #fff;
}

/* TOPO */
.topo {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.titulo {
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 1px;
white-space: nowrap;
color: pink;
width: 80%;
overflow-x: auto;
}

.icone {
    font-size: 22px;
    opacity: 0.8;
}

/* DATA */
.data {
    margin: 20px;
    font-size: 18px;
    opacity: 0.8;
}

.hoje {
    background: linear-gradient(135deg, #ff4d6d, #ff758f);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 14px;
}

/* LISTA */
#lista {
    padding-bottom: 100px;
}

/* CARD */
.card {
    background: #ff8fab;
    margin: 15px;
    padding: 18px;
    border-radius: 108px;
    display: flex;
    gap: 12px;
    backdrop-filter: blur(8px);
    border: 2px solid #ff4d6d;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.02);
    background: rgba(255,255,255,0.08);
}

.card .info {
    text-align: left;
}

.card .titulo-card {
    font-size: 18px;
    font-weight: bold;
}

.card .sub {
    font-size: 14px;
    opacity: 0.7;
}

/* BOTÃO */
.botao {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: linear-gradient(135deg, #ff4d6d, #ff758f);
    width: 65px;
    height: 65px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 20px rgba(255, 77, 109, 0.6);
    transition: 0.2s;
}

.botao:hover {
    transform: scale(1.1);
}

/* TELA DE GRÁFICOS */
#telaGraficos {
    padding: 15px;
}

#telaGraficos button {
    background: #222;
    color: #fff;
    border: none;
    padding: 10px 15px;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* CANVAS */
canvas {
    background: rgba(255,255,255,0.03);
    border-radius: 15px;
    padding: 10px;
    margin-bottom: 15px;
}
</style>

<style>
.apagar {
    background: red;
    color: #fff;
    border: none;
    padding: 12px 18px;
    border-radius: 120px;
    margin: 15px;
    font-size: 14px;
    box-shadow: 0 0 10px rgba(157, 78, 221, 0.5);
    transition: 0.2s;
position: absolute;
bottom: 20px;
left: 20px;
}

.apagar:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, #7b2cbf, #9d4edd);
}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="topo">
    <div class="icone">☰</div>
    <div class="titulo">Clique em mim para voltar!</div>
    <div class="icone">🔍</div>
</div>

<div class="data">
    <span class="hoje">Hoje</span>
</div>

<div id="lista"></div>

<div id="telaGraficos" style="display:none;">
    <button onclick="voltar()">⬅ Voltar</button>

    <canvas id="g1"></canvas>
    <canvas id="g2"></canvas>
    <canvas id="g3"></canvas>
    <canvas id="g4"></canvas>
    <canvas id="g5"></canvas>
    <canvas id="g6"></canvas>
</div>


<div class="botao" onclick="abrirRegistro()">+</div>

<button class="apagar" onclick="apagarTudo()">🗑 Apagar tudo</button>

<script>

function getDados() {
    return JSON.parse(localStorage.getItem("ciclo")) || [];
}

function salvarDados(dados) {
    localStorage.setItem("ciclo", JSON.stringify(dados));
}

/* =========================
   PERGUNTAS
========================= */
function perguntar(question) {
    return confirm(question);
}

function abrirRegistro() {
    let data = prompt("Data (YYYY-MM-DD)");
    if (!data) return;

    let registro = {
        data,

        // consumo
        agua: perguntar("Bebeu água?"),
        cafe: perguntar("Tomou café?"),
        chocolate: perguntar("Comeu chocolate 70%?"),

        // humor/dor
        humorTexto: prompt("Humor (feliz, triste, desconfortavel)"),
        dor: Number(prompt("Dor (0-10)")),

        // 20 perguntas
        cansaco: perguntar("Sentiu cansaço?"),
        irritacao: perguntar("Teve irritação?"),
        ansiedade: perguntar("Sentiu ansiedade?"),
        colica: perguntar("Teve cólica?"),
        dorCabeca: perguntar("Teve dor de cabeça?"),
        inchaco: perguntar("Sentiu inchaço?"),
        acne: perguntar("Teve acne?"),
        sonoRuim: perguntar("Dormiu mal?"),
        apetite: perguntar("Apetite alterado?"),
        exercicio: perguntar("Fez exercício?"),
        libido: perguntar("Libido alterada?"),
        concentracao: perguntar("Dificuldade de concentração?"),
        estresse: perguntar("Teve estresse?"),
        tristeza: perguntar("Sentiu tristeza?"),
        felicidade: perguntar("Sentiu felicidade?"),
        sensibilidade: perguntar("Sensibilidade emocional?"),
        dorSeios: perguntar("Dor nos seios?"),
        nausea: perguntar("Teve náusea?"),
        tontura: perguntar("Teve tontura?"),
        energiaBaixa: perguntar("Energia baixa?")
    };

    criarRegistro(registro);
}

/* =========================
   CRIAR
========================= */
function criarRegistro(dia) {
    let dados = getDados();
    dados.push(dia);
    salvarDados(dados);
    renderizar();
}

/* =========================
   APAGAR
========================= */
function apagarTudo() {
    if (!confirm("Apagar tudo?")) return;
    localStorage.removeItem("ciclo");
    renderizar();
}

/* =========================
   RENDER
========================= */
function formatarData(data) {
    let d = new Date(data);
    return d.toLocaleDateString("pt-BR");
}

function renderizar() {
    let dados = getDados();
    let container = document.getElementById("lista");

    if (!container) return;

    container.innerHTML = "";

    dados.forEach((d, i) => {
        let card = document.createElement("div");
        card.className = "card";

        card.onclick = () => abrirGraficos(d);

        let emoji = "😐";
if (d.humorTexto === "feliz") emoji = "😊";
if (d.humorTexto === "triste") emoji = "😢";
if (d.humorTexto === "desconfortavel") emoji = "😣";

card.innerHTML = `
    <div style="font-size:28px">${emoji}</div>
    <div class="info">
        <div class="titulo-card">${formatarData(d.data)}</div>
        <div class="sub">
            Dor: ${d.dor} • Humor: ${d.humorTexto}
        </div>
    </div>
`;

        container.appendChild(card);
    });
}

/* =========================
   GRÁFICOS (6)
========================= */
let charts = [];

function destruirGraficos() {
    charts.forEach(c => c.destroy());
    charts = [];
}

function abrirGraficos(d) {
    document.getElementById("lista").style.display = "none";
    document.getElementById("telaGraficos").style.display = "block";

    destruirGraficos();

    charts.push(new Chart(g1, {
        type: "bar",
        data: {
            labels: ["Dor"],
            datasets: [{ data: [d.dor] }]
        }
    }));

    charts.push(new Chart(g2, {
        type: "pie",
        data: {
            labels: ["Água", "Café", "Chocolate"],
            datasets: [{
                data: [
                    d.agua ? 1 : 0,
                    d.cafe ? 1 : 0,
                    d.chocolate ? 1 : 0
                ]
            }]
        }
    }));

    charts.push(new Chart(g3, {
        type: "radar",
        data: {
            labels: ["Cansaço", "Ansiedade", "Estresse", "Tristeza"],
            datasets: [{
                data: [
                    d.cansaco,
                    d.ansiedade,
                    d.estresse,
                    d.tristeza
                ]
            }]
        }
    }));

    charts.push(new Chart(g4, {
        type: "polarArea",
        data: {
            labels: ["Cólica", "Dor cabeça", "Inchaço"],
            datasets: [{
                data: [
                    d.colica,
                    d.dorCabeca,
                    d.inchaco
                ]
            }]
        }
    }));

    charts.push(new Chart(g5, {
        type: "doughnut",
        data: {
            labels: ["Exercício", "Sono ruim", "Energia baixa"],
            datasets: [{
                data: [
                    d.exercicio,
                    d.sonoRuim,
                    d.energiaBaixa
                ]
            }]
        }
    }));

    charts.push(new Chart(g6, {
        type: "line",
        data: {
            labels: ["Libido", "Concentração", "Sensibilidade"],
            datasets: [{
                data: [
                    d.libido,
                    d.concentracao,
                    d.sensibilidade
                ]
            }]
        }
    }));
}

function voltar() {
    document.getElementById("lista").style.display = "block";
    document.getElementById("telaGraficos").style.display = "none";
}

/* iniciar */
renderizar();
</script>

<script>
function getDados() {
    return JSON.parse(localStorage.getItem("ciclo")) || [];
}

function salvarDados(dados) {
    localStorage.setItem("ciclo", JSON.stringify(dados));
}

/* =========================
   APAGAR TUDO
========================= */
function apagarTudo() {
    if (!confirm("Tem certeza que deseja apagar TODOS os registros?")) return;

    localStorage.removeItem("ciclo");
    renderizar();
}

/* =========================
   APAGAR UM REGISTRO
========================= */
function apagarRegistro(index) {
    let dados = getDados();

    if (!confirm("Apagar esse registro?")) return;

    dados.splice(index, 1);

    salvarDados(dados);
    renderizar();
}

/* =========================
   RENDER COM BOTÃO APAGAR
========================= */
function renderizar() {
    let dados = getDados();
    let container = document.getElementById("lista");

    if (!container) return;

    container.innerHTML = "";

    if (dados.length === 0) {
        container.innerHTML = "<div style='opacity:0.6;text-align:center;'>Nenhum registro</div>";
        return;
    }

    dados.forEach((d, i) => {
    let card = document.createElement("div");
    card.className = "card";

    // 🔥 ISSO AQUI QUE FALTAVA
    card.onclick = () => abrirGraficos(d);

    let emoji = "😐";
    if (d.humorTexto === "feliz") emoji = "😊";
    if (d.humorTexto === "triste") emoji = "😢";
    if (d.humorTexto === "desconfortavel") emoji = "😣";

    card.innerHTML = `
        <div style="font-size:26px">${emoji}</div>
        <div class="info">
            <div>${d.data}</div>
            <div>Dor: ${d.dor} | ${d.humorTexto}</div>
        </div>
        <div style="margin-left:auto;cursor:pointer;" onclick="event.stopPropagation(); apagarRegistro(${i})">
            🗑
        </div>
    `;

    container.appendChild(card);
});
}
</script>

<script>
document.addEventListener("DOMContentLoaded", function() {
    let titulo = document.querySelector(".titulo");

    if (titulo) {
        titulo.onclick = function() {
            window.location.href = "botao.html";
        };
    }
});
</script>

</body>
</html>
