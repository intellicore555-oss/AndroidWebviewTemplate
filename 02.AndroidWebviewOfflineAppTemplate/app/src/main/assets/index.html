<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel de Projetos</title>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Quicksand', sans-serif;
    }

    body{
      min-height:100vh;
      background:#000;
      display:flex;
      justify-content:center;
      align-items:center;
flex-direction: column;
      padding:20px;
      color:white;
gap: 20px;
    }

    .container{
      width:100%;
      max-width:420px;
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:28px;
      padding:35px 25px;
      box-shadow:
        0 10px 40px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.05);
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .title{
      text-align:center;
      margin-bottom:10px;
    }

    .title h1{
      font-size:28px;
      font-weight:700;
      margin-bottom:8px;
    }

    .title p{
      font-size:14px;
      color:#cbd5e1;
      line-height:1.5;
    }

    .card-btn{
      width:100%;
      border:none;
      border-radius:220px;
      padding:18px;
      cursor:pointer;
      color:white;
      text-align:left;
      transition:0.25s ease;
      position:relative;
      overflow:hidden;
    }

    .card-btn::before{
      content:"";
      position:absolute;
      inset:0;
      background:rgba(255,255,255,0.08);
      opacity:0;
      transition:0.25s;
    }

    .card-btn:hover{
      transform:translateY(-3px) scale(1.01);
    }

    .card-btn:hover::before{
      opacity:1;
    }

    .btn1{
      background:linear-gradient(135deg, #2563eb, #1d4ed8);
      box-shadow:0 10px 25px rgba(37,99,235,0.35);
    }

    .btn2{
      background:linear-gradient(135deg, #ec4899, #be185d);
      box-shadow:0 10px 25px rgba(236,72,153,0.35);
    }

    .project-name{
      font-size:18px;
      font-weight:700;
      margin-bottom:5px;
      position:relative;
      z-index:1;
    }

    .project-desc{
      font-size:13px;
      color:rgba(255,255,255,0.85);
      position:relative;
      z-index:1;
    }

    .footer{
      margin-top:10px;
      text-align:center;
      font-size:12px;
      color:#94a3b8;
    }

    @media (max-width:480px){
      .title h1{
        font-size:24px;
      }

      .card-btn{
        padding:16px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
<div class="title">
      <h1>🚀 Painel de Projetos</h1>
      <p>
        Acesse rapidamente as contas Google dos seus projetos conectados.
      </p>
    </div>
</div>

    <button class="card-btn btn1" onclick="window.location.href='index1.html'">

      <div class="project-name">
        ArtUi Remasterizada
      </div>

      
    </button>

    <button class="card-btn btn2" onclick="window.location.href='index01.html'">

      <div class="project-name">
        Mulher Amparada
      </div>

      

    </button>

   
</body>
</html>
