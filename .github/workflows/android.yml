name: Build APK (Auto Fix Gradle Wrapper)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ==========================
      # CHECKOUT
      # ==========================
      - name: Checkout
        uses: actions/checkout@v4

      # ==========================
      # JAVA 17
      # ==========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ==========================
      # FIX GRADLE WRAPPER AUTOMATICAMENTE
      # ==========================
      - name: Rebuild Gradle Wrapper
        run: |
          cd "02. ArtUi"

          echo "Downloading Gradle 8.2.1..."
          curl -L https://services.gradle.org/distributions/gradle-8.2.1-bin.zip -o gradle.zip

          echo "Unzipping..."
          unzip -q gradle.zip

          echo "Generating wrapper..."
          gradle-8.2.1/bin/gradle wrapper --gradle-version 8.2.1 --distribution-type all

          chmod +x gradlew

      # ==========================
      # BUILD DEBUG
      # ==========================
      - name: Build Debug APK
        run: |
          cd "02. ArtUi"
          ./gradlew assembleDebug

      # ==========================
      # BUILD RELEASE
      # ==========================
      - name: Build Release APK
        run: |
          cd "02. ArtUi"
          ./gradlew assembleRelease

      # ==========================
      # UPLOAD DEBUG
      # ==========================
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: 02. ArtUi/app/build/outputs/apk/debug/*.apk

      # ==========================
      # UPLOAD RELEASE
      # ==========================
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: 02. ArtUi/app/build/outputs/apk/release/*.apk
