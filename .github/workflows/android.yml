name: Build APK

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Dar permissão ao gradlew
        run: chmod +x 01.WebViewStarterTemplate/gradlew

      - name: Build APK
        run: cd 01.WebViewStarterTemplate && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: 01.WebViewStarterTemplate/app/build/outputs/apk/debug/*.apk
