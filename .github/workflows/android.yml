name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ==========================
      # CHECKOUT
      # ==========================
      - name: Checkout
        uses: actions/checkout@v4

      # ==========================
      # JAVA 17
      # ==========================
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ==========================
      # INSTALAR GRADLE (SEM WRAPPER)
      # ==========================
      - name: Instalar Gradle
        run: sudo apt-get update && sudo apt-get install -y gradle

      # ==========================
      # DEBUG BUILD
      # ==========================
      - name: Build Debug APK
        run: |
          cd "02. ArtUi"
          gradle assembleDebug

      # ==========================
      # UPLOAD DEBUG
      # ==========================
      - name: Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: Mulher-Amparada-debug
          path: 02. ArtUi/app/build/outputs/apk/debug/*.apk

      # ==========================
      # RELEASE BUILD
      # ==========================
      - name: Build Release APK
        run: |
          cd "02. ArtUi"
          gradle assembleRelease

      # ==========================
      # UPLOAD RELEASE
      # ==========================
      - name: Upload APK Release
        uses: actions/upload-artifact@v4
        with:
          name: Mulher-Amparada-release
          path: 02. ArtUi/app/build/outputs/apk/release/*.apk
